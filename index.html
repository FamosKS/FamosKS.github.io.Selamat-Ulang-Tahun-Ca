<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Ulang Tahun!</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-light: linear-gradient(140deg, #fdf2f8, #fce7f3, #e0f2fe);
      --card-bg: rgba(255, 255, 255, 0.85);
      --accent: #ec4899;
      --text: #4b5563;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-dark);
      transition: background 1.5s ease;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    body.bright { background: var(--bg-light); }

    .stage {
      text-align: center;
      z-index: 2;
      padding: 2rem;
    }

    /* Cake Styles */
    .cake-wrap {
      width: 160px; height: 140px; margin: 0 auto 2rem; position: relative;
    }
    .plate {
      width: 180px; height: 12px; background: #e2e8f0; border-radius: 10px;
      position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .layer { position: absolute; left: 50%; transform: translateX(-50%); border-radius: 14px; }
    .l1 { bottom: 0; width: 120px; height: 40px; background: #fbcfe8; border-radius: 8px 8px 0 0; }
    .l2 { bottom: 40px; width: 100px; height: 35px; background: #fde68a; opacity: 0.9; }
    .l3 { bottom: 75px; width: 80px; height: 30px; background: #fef3c7; }
    
    .candle {
      width: 8px; height: 35px; background: #fff; border-radius: 4px;
      position: absolute; bottom: 105px; left: 50%; transform: translateX(-50%);
    }
    .wick {
      width: 2px; height: 8px; background: #555;
      position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
    }
    .flame {
      width: 16px; height: 22px;
      background: radial-gradient(circle, #fcd34d, #f59e0b);
      border-radius: 50% 50% 30% 30%;
      position: absolute; bottom: 146px; left: 50%; transform: translateX(-50%);
      box-shadow: 0 0 25px #f59e0b;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.5s ease;
    }
    .flame.on {
      opacity: 1;
      animation: flicker 0.5s infinite alternate;
    }
    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1) rotate(-3deg); }
      100% { transform: translateX(-50%) scale(1.1) rotate(3deg); }
    }
    .flame.out {
      opacity: 0 !important;
      transform: translateX(-50%) scale(0.5);
    }

    .smoke {
      width: 10px; height: 40px;
      background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.8), transparent);
      position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
      opacity: 0;
      filter: blur(4px);
    }
    .smoke.active {
      animation: smokeUp 2s ease-out forwards;
    }
    @keyframes smokeUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.5); }
      20% { opacity: 0.8; transform: translateX(-50%) translateY(-10px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-60px) scale(2); }
    }

    /* Button Styles */
    .btn {
      padding: 0.8rem 2rem;
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 50px; cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
    }
    .btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.3); }
    .btn:disabled { opacity: 0; pointer-events: none; transform: scale(0.9); }

    /* Letter Card Styles */
    .card {
      position: relative;
      background: var(--card-bg);
      padding: 3rem 2.5rem;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      max-width: 500px;
      text-align: center;
      margin-top: 2rem;
      opacity: 0;
      transform: translateY(50px) scale(0.95);
      transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      display: none;
    }
    .card.show {
      display: block;
      opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
    }
    .card h1 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }
    .card p {
      font-size: 1.15rem; line-height: 1.8; color: #4b5563; margin-bottom: 0.5rem;
    }
    .card em { color: #ec4899; font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; }

    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="stage">
    <div class="cake-wrap">
      <div class="layer l1"></div><div class="layer l2"></div><div class="layer l3"></div>
      <div class="plate"></div>
      <div class="candle"></div>
      <div class="wick"></div>
      <div class="flame" id="flame"></div>
      <div class="smoke" id="smoke"></div>
    </div>

    <button class="btn" id="actionBtn">Nyalakan Lilin 🕯️</button>

    <div class="card" id="letterCard">
      <h1>Selamat Ulang Tahun, Caca 🌸</h1>
      <p>Semoga panjang umur, sehat selalu,</p>
      <p>dan <em>semangat kuliahnya</em> ca.</p>
    </div>
  </div>

  <script>
    const btn = document.getElementById('actionBtn');
    const flame = document.getElementById('flame');
    const smoke = document.getElementById('smoke');
    const card = document.getElementById('letterCard');
    const body = document.body;

    let state = 0; // 0: awal, 1: lilin nyala

    btn.addEventListener('click', () => {
      if (state === 0) {
        // Nyalakan
        flame.classList.add('on');
        btn.innerHTML = "Tiup Lilinnya 🌬️";
        state = 1;
      } else {
        // Tiup
        flame.classList.remove('on');
        flame.classList.add('out');
        smoke.classList.add('active');
        btn.disabled = true; // Sembunyikan tombol
        
        // Background jadi terang
        setTimeout(() => {
          body.classList.add('bright');
          explodeConfetti();
          showLetter();
        }, 800);
        
        state = 2;
      }
    });

    function showLetter() {
      setTimeout(() => {
        card.style.display = 'block';
        // Force reflow agar transisi jalan
        void card.offsetWidth; 
        card.classList.add('show');
      }, 200);
    }

    // --- Confetti System ---
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    const pieces = [];
    const palette = ['#fce7f3','#fde68a','#dbeafe','#fef3c7','#fbcfe8','#e0f2fe','#ffedd5'];

    window.addEventListener('resize', () => { W=innerWidth; H=innerHeight; canvas.width=W; canvas.height=H; });

    function spawnPiece(x, y, burst=false){
      return {
        x: x || Math.random()*W,
        y: y || -20,
        w: Math.random()*8+5, h: Math.random()*8+5,
        c: palette[Math.floor(Math.random()*palette.length)],
        v: burst ? (Math.random()*4+2) : (Math.random()*1.5+1),
        vy: burst ? (Math.random()*-5-2) : (Math.random()*0),
        s: (Math.random()-0.5)*0.1, a: Math.random()*360,
        isCircle: Math.random()>0.4, opacity: 1
      };
    }

    // Loop confetti
    function loop(){
      ctx.clearRect(0,0,W,H);
      pieces.forEach((p,i) => {
        p.y += p.v;
        p.x += Math.sin(p.y*0.01)*0.5;
        if(p.vy !== 0) { p.y += p.vy; p.vy += 0.2; } // Gravity for burst
        p.a += p.s;
        if(p.y > H+20) { p.y = -20; p.x = Math.random()*W; p.vy=0; }
        
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.a);
        ctx.globalAlpha = p.opacity; ctx.fillStyle = p.c;
        if(p.isCircle){ ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
        ctx.restore();
      });
      requestAnimationFrame(loop);
    }

    // Start light rain
    for(let i=0; i<40; i++) pieces.push(spawnPiece());
    loop();

    // Burst effect
    function explodeConfetti(){
      for(let i=0; i<150; i++){
        pieces.push(spawnPiece(W/2, H/2, true));
      }
    }
  </script>
</body>
</html>
